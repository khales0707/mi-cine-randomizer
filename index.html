<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Randomizer - @mundoo.cine</title>
    <style>
        :root { --primary: #6c70b0; --bg-card: #14181c; --text-main: #ffffff; --text-secondary: #9ab; --accent: #00e054; }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; color: var(--text-main); background: #000; overflow-x: hidden;
            background-image: url('fondo.jpg'); background-size: cover; background-position: center;
        }

        .card {
            background-color: var(--bg-card); 
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            max-width: 600px; width: 92%; 
            border: 1px solid rgba(255,255,255,0.05);
            margin: 20px auto; position: relative;
        }

        /* HEADER REDES */
        .header-socials {
            padding: 15px; display: flex; justify-content: center; gap: 20px;
            background: rgba(0,0,0,0.3); align-items: center;
        }
        .social-icon { width: 20px; height: 20px; transition: 0.3s; }

        /* BANNER DINÁMICO ESTILO LETTERBOXD */
        .banner-container {
            width: 100%; height: 220px; position: relative;
            background-size: cover; background-position: center; display: none;
        }
        .banner-container::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(20,24,28,0) 0%, rgba(20,24,28,1) 100%);
        }

        /* CONTENIDO DE LA PELÍCULA */
        .movie-info-layout {
            padding: 0 20px 20px 20px; display: none; margin-top: -60px;
            position: relative; z-index: 2;
        }

        .top-row { display: flex; gap: 20px; align-items: flex-end; margin-bottom: 20px; }
        
        .text-side { flex: 1; }
        .text-side h1 { font-size: 1.8rem; margin: 0; font-weight: 900; line-height: 1.1; letter-spacing: -0.5px; }
        .meta-info { color: var(--text-secondary); font-size: 0.9rem; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .meta-info span { font-weight: bold; color: #eee; }

        .poster-mini {
            width: 100px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* BOTONES ESTILO APP */
        .button-row { display: flex; gap: 10px; margin: 15px 0; }
        .btn-app {
            background: #2c3440; color: #eee; border: none; padding: 10px 15px;
            border-radius: 6px; font-size: 0.8rem; font-weight: bold; cursor: pointer;
            text-decoration: none; display: flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .btn-app:hover { background: #445566; }

        /* SINOPSIS */
        .synopsis {
            color: var(--text-secondary); font-size: 0.95rem; line-height: 1.5;
            max-height: 100px; overflow-y: auto; padding-right: 10px; margin-bottom: 25px;
        }
        .synopsis::-webkit-scrollbar { width: 3px; }
        .synopsis::-webkit-scrollbar-thumb { background: #445566; }

        /* SECCIÓN CAST (REEMPLAZA RATINGS) */
        .cast-section { border-top: 1px solid #2c3440; padding-top: 15px; }
        .cast-section h3 { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }
        .cast-list { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 5px; }
        .cast-item { text-align: center; min-width: 60px; }
        .cast-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 1px solid #445566; }
        .cast-name { font-size: 0.65rem; color: var(--text-secondary); display: block; margin-top: 5px; line-height: 1.1; }

        /* FOOTER CON BOTÓN SORTEAR */
        .footer-actions { padding: 20px; background: #1b2228; text-align: center; }
        .filters { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; }
        select {
            background: #2c3440; color: white; border: none; padding: 8px 12px; border-radius: 4px; font-size: 0.8rem;
        }
        .btn-main {
            background: var(--primary); color: white; border: none; padding: 15px;
            width: 100%; border-radius: 8px; font-weight: bold; font-size: 1rem;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }

        @media (max-width: 500px) {
            .text-side h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-socials">
            <a href="https://instagram.com/mundoo.cine" target="_blank">
                <svg class="social-icon" viewBox="0 0 24 24">
                    <defs><radialGradient id="ig-grad" r="150%" cx="30%" cy="107%"><stop stop-color="#fdf497" offset="0"/><stop stop-color="#fd5949" offset="0.45"/><stop stop-color="#d6249f" offset="0.6"/><stop stop-color="#285AEB" offset="0.9"/></radialGradient></defs>
                    <path fill="url(#ig-grad)" d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.073-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
            </a>
            <a href="https://boxd.it/37NZT" target="_blank">
                <svg class="social-icon" viewBox="0 0 38 38"><circle fill="#00E054" cx="7" cy="19" r="7"/><circle fill="#FF8000" cx="19" cy="19" r="7"/><circle fill="#40BCF4" cx="31" cy="19" r="7"/></svg>
            </a>
            <a href="https://x.com/soy_Khales" target="_blank">
                <svg class="social-icon" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            </a>
        </div>

        <div id="banner" class="banner-container"></div>

        <div id="welcome-msg" style="padding: 40px 20px; text-align: center;">
            <h2 style="margin: 0; font-size: 2rem;">¿Qué miramos hoy?</h2>
            <p style="color: var(--text-secondary);">Dejá que el azar elija tu próxima película</p>
        </div>

        <div id="movie-content" class="movie-info-layout">
            <div class="top-row">
                <div class="text-side">
                    <h1 id="title"></h1>
                    <div class="meta-info"><span id="year"></span> · DIRECTED BY <span id="director"></span></div>
                    <div class="button-row">
                        <a id="btn-trailer" href="#" target="_blank" class="btn-app">▶ TRAILER</a>
                        <a id="btn-jw" href="#" target="_blank" class="btn-app">📺 JUSTWATCH</a>
                    </div>
                </div>
                <img id="poster" src="" class="poster-mini">
            </div>

            <div id="overview" class="synopsis"></div>

            <div class="cast-section">
                <h3>Cast Principal</h3>
                <div id="cast-list" class="cast-list"></div>
            </div>
        </div>

        <div class="footer-actions">
            <div class="filters">
                <select id="filter-genre">
                    <option value="">Cualquier Género</option>
                    <option value="28">Acción</option><option value="16">Animación</option><option value="35">Comedia</option>
                    <option value="27">Terror</option><option value="878">Ciencia Ficción</option><option value="18">Drama</option>
                </select>
                <select id="filter-decade">
                    <option value="">Cualquier Año</option>
                    <option value="2020">2020s</option><option value="2010">2010s</option><option value="2000">2000s</option>
                    <option value="1990">1990s</option>
                </select>
            </div>
            <button class="btn-main" id="btn-sortear" onclick="sortear()">¡Sorprendeme!</button>
        </div>
    </div>

    <script>
        const API_KEY = 'b9911fb46e0e11491607c279cce876a1';

        async function sortear() {
            const btn = document.getElementById('btn-sortear');
            const genre = document.getElementById('filter-genre').value;
            const decade = document.getElementById('filter-decade').value;
            
            btn.innerText = "BUSCANDO...";
            btn.disabled = true;

            try {
                let url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=es-MX&sort_by=vote_count.desc&include_adult=false&page=${Math.floor(Math.random() * 5) + 1}`;
                if (genre) url += `&with_genres=${genre}`;
                if (decade) url += `&primary_release_date.gte=${decade}-01-01&primary_release_date.lte=${parseInt(decade)+9}-12-31`;

                const resp = await fetch(url);
                const data = await resp.json();
                const movie = data.results[Math.floor(Math.random() * data.results.length)];

                if (movie) {
                    const [det, vid] = await Promise.all([
                        fetch(`https://api.themoviedb.org/3/movie/${movie.id}?api_key=${API_KEY}&language=es-MX&append_to_response=credits`),
                        fetch(`https://api.themoviedb.org/3/movie/${movie.id}/videos?api_key=${API_KEY}`)
                    ]);
                    const details = await det.json();
                    const videos = await vid.json();

                    document.getElementById('welcome-msg').style.display = 'none';
                    document.getElementById('banner').style.display = 'block';
                    document.getElementById('movie-content').style.display = 'block';

                    // Backdrop (Banner)
                    if(details.backdrop_path) document.getElementById('banner').style.backgroundImage = `url(https://image.tmdb.org/t/p/w1280${details.backdrop_path})`;
                    
                    // Info Básica
                    document.getElementById('title').innerText = movie.title;
                    document.getElementById('poster').src = `https://image.tmdb.org/t/p/w500${movie.poster_path}`;
                    document.getElementById('year').innerText = movie.release_date.split('-')[0];
                    document.getElementById('overview').innerText = movie.overview || "Sinopsis no disponible.";
                    
                    const dir = details.credits.crew.find(c => c.job === 'Director');
                    document.getElementById('director').innerText = dir ? dir.name : 'Unknown';

                    // Cast
                    document.getElementById('cast-list').innerHTML = details.credits.cast.slice(0, 5).map(a => `
                        <div class="cast-item">
                            <img src="${a.profile_path ? 'https://image.tmdb.org/t/p/w185' + a.profile_path : 'https://via.placeholder.com/50'}" class="cast-img">
                            <span class="cast-name">${a.name}</span>
                        </div>`).join('');

                    // Botones
                    const trailer = videos.results.find(v => v.type === 'Trailer');
                    document.getElementById('btn-trailer').href = trailer ? `https://youtube.com/watch?v=${trailer.key}` : '#';
                    document.getElementById('btn-jw').href = `https://www.justwatch.com/ar/buscar?q=${encodeURIComponent(movie.title)}`;
                }
            } catch (e) { console.error(e); }

            btn.innerText = "¡Sorprendeme!";
            btn.disabled = false;
        }
    </script>
</body>
</html>
