<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Finder - @mundoo.cine</title>
    <style>
        :root { 
            --primary: #6c70b0; /* Tu color Lila */
            --bg-color: #14181c; 
            --text-main: #ffffff; 
            --text-sec: #9ab; 
            --yt-red: #ff0000;
            --jw-yellow: #fbc02d;
        }

        body { 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            margin: 0; background-color: var(--bg-color); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        /* FONDO NÍTIDO PARA PC */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.05; pointer-events: none; z-index: 1000;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .main-wrapper { width: 92%; max-width: 750px; padding: 25px 0; position: relative; z-index: 10; }

        .user-header { text-align: center; margin-bottom: 30px; }
        .avatar { width: 55px; height: 55px; border-radius: 50%; border: 1.5px solid var(--primary); margin-bottom: 8px; }
        .social-row { display: flex; justify-content: center; gap: 15px; margin-top: 8px; }
        .social-icon { width: 18px; height: 18px; transition: 0.3s; opacity: 0.7; }
        .social-icon:hover { opacity: 1; transform: translateY(-2px); }

        /* MOVIE DETAIL */
        .hero-banner {
            width: 100%; height: 320px; background-size: cover; background-position: center;
            border-radius: 12px; display: none; position: relative;
        }
        .hero-banner::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 0%, var(--bg-color) 95%);
        }

        .movie-header { display: none; align-items: flex-end; gap: 20px; margin-top: -85px; position: relative; z-index: 20; }
        .poster-container { flex: 0 0 115px; }
        .poster-img { width: 100%; border-radius: 4px; box-shadow: 0 8px 30px rgba(0,0,0,1); border: 1px solid rgba(255,255,255,0.1); }

        .info-container { flex: 1; }
        .movie-title h1 { font-size: 1.6rem; margin: 0; font-weight: 800; line-height: 1.1; }
        .movie-meta { color: var(--text-sec); font-size: 0.75rem; margin-top: 4px; }
        .dir-name { color: #eee; font-size: 0.85rem; font-weight: 500; display: block; margin-top: 4px; }
        
        /* ESTRELLAS LILA */
        .stars-row { color: var(--primary); font-size: 1.2rem; margin-top: 8px; letter-spacing: 1px; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-app {
            background: #2c3440; color: white; border: none; padding: 8px 15px; border-radius: 4px;
            font-size: 0.7rem; font-weight: 700; cursor: pointer; text-decoration: none; text-transform: uppercase;
            transition: 0.2s; white-space: nowrap;
        }
        .btn-trailer:hover { background: var(--yt-red) !important; }
        .btn-jw:hover { background: var(--jw-yellow) !important; color: black; }

        .synopsis { font-size: 0.95rem; line-height: 1.6; color: #ccddee; margin: 30px 0; }

        .section-label { font-size: 0.65rem; color: var(--text-sec); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #2c3440; padding-bottom: 8px; margin: 25px 0 15px 0; }
        .horizontal-list { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .cast-item { min-width: 65px; text-align: center; }
        .cast-img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 1px solid #334455; }
        
        .grid-display { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .grid-item img { width: 100%; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .grid-item img:hover { transform: scale(1.05); }

        /* FOOTER CONTROLS */
        .controls-footer { 
            text-align: center; margin-top: 40px; padding: 30px; 
            background: rgba(0,0,0,0.2); border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .filter-row { display: flex; gap: 10px; justify-content: center; width: 100%; max-width: 340px; }
        select { background: #2c3440; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 0.85rem; flex: 1; outline: none; }
        
        .btn-sortear { 
            background: var(--primary); color: white; border: none; padding: 18px; 
            border-radius: 10px; font-weight: bold; width: 100%; max-width: 340px; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .btn-sortear:hover { background: #7b7fc2; transform: translateY(-2px); }

        @media (max-width: 500px) {
            .poster-container { flex: 0 0 95px; }
            .movie-title h1 { font-size: 1.3rem; }
            .btn-group { flex-wrap: wrap; }
            .btn-app { flex: 1; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="user-header">
            <img src="avatar.jpg" class="avatar">
            <div style="font-size: 0.9rem; font-weight: 700;">@mundoo.cine</div>
            <div class="social-row">
                <a href="https://instagram.com/mundoo.cine" target="_blank"><svg class="social-icon" viewBox="0 0 24 24"><defs><radialGradient id="ig-grad" r="150%" cx="30%" cy="107%"><stop stop-color="#fdf497" offset="0"/><stop stop-color="#fd5949" offset="0.45"/><stop stop-color="#d6249f" offset="0.6"/><stop stop-color="#285AEB" offset="0.9"/></radialGradient></defs><path fill="url(#ig-grad)" d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.073-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></a>
                <a href="https://boxd.it/37NZT" target="_blank"><svg class="social-icon" viewBox="0 0 38 38"><circle fill="#00E054" cx="7" cy="19" r="7"/><circle fill="#FF8000" cx="19" cy="19" r="7"/><circle fill="#40BCF4" cx="31" cy="19" r="7"/></svg></a>
                <a href="https://x.com/soy_Khales" target="_blank"><svg class="social-icon" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
            </div>
        </div>

        <div id="hero" class="hero-banner"></div>

        <div id="movie-info" class="movie-header">
            <div class="poster-container"><img id="poster" src="" class="poster-img"></div>
            <div class="info-container">
                <div class="movie-title">
                    <h1 id="title"></h1>
                    <div class="movie-meta"><span id="year"></span> · <span id="runtime"></span></div>
                    <span id="director" class="dir-name"></span>
                    <div id="stars" class="stars-row"></div>
                </div>
                <div class="btn-group">
                    <a id="btn-trailer" href="#" target="_blank" class="btn-app btn-trailer">▶ Tráiler</a>
                    <a id="btn-jw" href="#" target="_blank" class="btn-app btn-jw">🔍 ¿Dónde Ver?</a>
                </div>
            </div>
        </div>

        <div id="overview" class="synopsis"></div>

        <div id="cast-section" style="display:none;">
            <div class="section-label">Reparto Principal</div>
            <div id="cast-list" class="horizontal-list"></div>
        </div>

        <div id="grid-section" style="display:none;">
            <div class="section-label">Películas Similares</div>
            <div id="grid-display" class="grid-display"></div>
        </div>

        <div class="controls-footer">
            <div class="filter-row">
                <select id="filter-genre">
                    <option value="">Géneros</option>
                    <option value="28">Acción</option><option value="12">Aventura</option><option value="16">Animación</option>
                    <option value="35">Comedia</option><option value="80">Crimen</option><option value="18">Drama</option>
                    <option value="14">Fantasía</option><option value="27">Terror</option><option value="878">Sci-Fi</option>
                    <option value="53">Thriller</option>
                </select>
                <select id="filter-decade">
                    <option value="">Décadas</option>
                    <option value="2020">2020s</option><option value="2010">2010s</option><option value="2000">2000s</option>
                    <option value="1990">1990s</option><option value="1980">1980s</option><option value="1970">1970s</option>
                </select>
            </div>
            <button class="btn-sortear" onclick="sortear()">¡Sorprendeme!</button>
        </div>
    </div>

    <script>
        const API_KEY = 'b9911fb46e0e11491607c279cce876a1';

        async function loadMovie(movieId) {
            try {
                const [det, vid, sim] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=${API_KEY}&language=es-MX&append_to_response=credits`),
                    fetch(`https://api.themoviedb.org/3/movie/${movieId}/videos?api_key=${API_KEY}`),
                    fetch(`https://api.themoviedb.org/3/movie/${movieId}/similar?api_key=${API_KEY}&language=es-MX`)
                ]);
                const details = await det.json();
                const videos = await vid.json();
                const similar = await sim.json();

                document.getElementById('hero').style.display = 'block';
                document.getElementById('movie-info').style.display = 'flex';
                document.getElementById('cast-section').style.display = 'block';
                document.getElementById('grid-section').style.display = 'block';

                if(details.backdrop_path) document.getElementById('hero').style.backgroundImage = `url(https://image.tmdb.org/t/p/w1280${details.backdrop_path})`;
                document.getElementById('title').innerText = details.title;
                document.getElementById('poster').src = `https://image.tmdb.org/t/p/w500${details.poster_path}`;
                document.getElementById('year').innerText = details.release_date.split('-')[0];
                document.getElementById('runtime').innerText = (details.runtime || 0) + " min";
                document.getElementById('overview').innerText = details.overview || "Sinopsis no disponible.";
                
                const stars = Math.round(details.vote_average / 2);
                document.getElementById('stars').innerHTML = '★'.repeat(stars) + '<span style="opacity:0.15">' + '★'.repeat(5-stars) + '</span>';

                const dir = details.credits.crew.find(c => c.job === 'Director');
                document.getElementById('director').innerText = dir ? `Dirigida por ${dir.name}` : '';

                document.getElementById('cast-list').innerHTML = details.credits.cast.slice(0, 12).map(a => `
                    <div class="cast-item">
                        <img src="${a.profile_path ? 'https://image.tmdb.org/t/p/w185' + a.profile_path : 'https://via.placeholder.com/60'}" class="cast-img">
                        <div style="font-size:0.55rem; color:#9ab; margin-top:5px; line-height:1.1;">${a.name}</div>
                    </div>`).join('');

                const trailer = videos.results.find(v => v.type === 'Trailer' || v.type === 'Teaser');
                document.getElementById('btn-trailer').href = trailer ? `https://youtube.com/watch?v=${trailer.key}` : '#';
                document.getElementById('btn-jw').href = `https://www.justwatch.com/ar/buscar?q=${encodeURIComponent(details.title)}`;

                document.getElementById('grid-display').innerHTML = similar.results.slice(0, 8).map(m => `
                    <div class="grid-item" onclick="loadMovie(${m.id})"><img src="https://image.tmdb.org/t/p/w342${m.poster_path}"></div>`).join('');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (e) { console.error(e); }
        }

        async function sortear() {
            const g = document.getElementById('filter-genre').value;
            const d = document.getElementById('filter-decade').value;
            let url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=es-MX&sort_by=vote_count.desc&page=${Math.floor(Math.random() * 10) + 1}`;
            if (g) url += `&with_genres=${g}`;
            if (d) url += `&primary_release_date.gte=${d}-01-01&primary_release_date.lte=${parseInt(d)+9}-12-31`;
            
            const resp = await fetch(url);
            const data = await resp.json();
            if(data.results && data.results.length > 0) {
                loadMovie(data.results[Math.floor(Math.random() * data.results.length)].id);
            }
        }
    </script>
</body>
</html>
