<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Finder - @mundoo.cine</title>
    <style>
        :root { 
            --primary: #6c70b0; 
            --bg-color: #14181c; 
            --text-main: #ffffff; 
            --text-sec: #9ab; 
            --yt-red: #e62117;
            --jw-yellow: #fbc02d;
        }

        /* FONDO PROCEDIMENTAL - Calidad infinita en PC */
        body { 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            margin: 0; background-color: var(--bg-color); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.06; pointer-events: none; z-index: 1000;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .main-wrapper { width: 92%; max-width: 750px; padding: 30px 0; position: relative; z-index: 10; }

        /* HEADER */
        .user-header { text-align: center; margin-bottom: 25px; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; border: 1.5px solid var(--primary); margin-bottom: 8px; }
        
        /* BUSCADOR */
        .search-box { margin-bottom: 30px; position: relative; }
        #search-input { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px 15px; border-radius: 8px; color: white; font-size: 0.9rem; outline: none; box-sizing: border-box;
        }

        /* MOVIE INFO AREA */
        .hero-banner {
            width: 100%; height: 320px; background-size: cover; background-position: center;
            border-radius: 12px; display: none; position: relative;
        }
        .hero-banner::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 10%, var(--bg-color) 100%);
        }

        .movie-header { 
            display: none; align-items: flex-end; gap: 20px; 
            margin-top: -100px; position: relative; z-index: 20; 
        }

        .poster-container { flex: 0 0 120px; }
        .poster-img { width: 100%; border-radius: 4px; box-shadow: 0 10px 25px rgba(0,0,0,0.8); }

        .info-container { flex: 1; padding-bottom: 10px; }
        .stars-badge { 
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); padding: 2px 8px; 
            border-radius: 4px; display: inline-block; margin-bottom: 8px; color: var(--primary);
        }

        .movie-title h1 { font-size: 1.6rem; margin: 0; font-weight: 800; line-height: 1.1; }
        .movie-meta { color: var(--text-sec); font-size: 0.75rem; margin-top: 5px; }
        .dir-label { font-size: 0.7rem; color: #789; text-transform: uppercase; display: block; margin-top: 10px; letter-spacing: 1px; }
        .dir-name { color: #eee; font-size: 0.95rem; font-weight: 500; }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-app {
            background: #2c3440; color: #ddd; border: none; padding: 7px 12px; border-radius: 4px;
            font-size: 0.7rem; font-weight: 700; cursor: pointer; text-decoration: none; text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-trailer:hover { background: var(--yt-red); color: white; }
        .btn-jw:hover { background: var(--jw-yellow); color: black; }

        .synopsis { font-size: 0.9rem; line-height: 1.5; color: #ccddee; margin: 25px 0; border-left: 2px solid var(--primary); padding-left: 15px; }

        /* SECCIONES SECUNDARIAS */
        .section-label { font-size: 0.65rem; color: var(--text-sec); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #2c3440; padding-bottom: 8px; margin-bottom: 15px; }
        .cast-list { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .cast-item { min-width: 55px; text-align: center; }
        .cast-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        .cast-name { font-size: 0.6rem; color: var(--text-sec); display: block; margin-top: 5px; }

        .similar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; }
        .similar-item { cursor: pointer; transition: 0.2s; }
        .similar-item:hover { opacity: 0.7; }
        .similar-item img { width: 100%; border-radius: 4px; }

        /* CONTROLES INFERIORES */
        .controls-footer { text-align: center; margin-top: 40px; padding: 25px; background: rgba(0,0,0,0.2); border-radius: 12px; }
        .filter-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 15px; }
        select { background: #2c3440; color: white; border: none; padding: 8px; border-radius: 6px; font-size: 0.8rem; }
        
        .btn-sortear {
            background: var(--primary); color: white; border: none; padding: 15px;
            border-radius: 8px; font-weight: bold; font-size: 0.9rem; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; width: 100%; max-width: 350px;
        }

        @media (max-width: 500px) {
            .movie-header { gap: 15px; }
            .poster-container { flex: 0 0 90px; }
            .movie-title h1 { font-size: 1.2rem; }
            .btn-group { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="user-header">
            <img src="avatar.jpg" class="avatar">
            <div style="font-size: 0.8rem; font-weight: 700;">@mundoo.cine</div>
        </div>

        <div class="search-box">
            <input type="text" id="search-input" placeholder="Busca por título, actor o director..." onkeypress="if(event.key === 'Enter') buscar()">
        </div>

        <div id="hero" class="hero-banner"></div>

        <div id="movie-info" class="movie-header">
            <div class="poster-container">
                <img id="poster" src="" class="poster-img">
            </div>
            <div class="info-container">
                <div class="stars-badge" id="stars"></div>
                <div class="movie-title">
                    <h1 id="title"></h1>
                    <div class="movie-meta"><span id="year"></span> · <span id="runtime"></span></div>
                    <span class="dir-label">Dirigido por</span>
                    <span id="director" class="dir-name"></span>
                </div>
                <div class="btn-group">
                    <a id="btn-trailer" href="#" target="_blank" class="btn-app btn-trailer">▶ Tráiler</a>
                    <a id="btn-jw" href="#" target="_blank" class="btn-app btn-jw">📺 Ver Disponibilidad</a>
                </div>
            </div>
        </div>

        <div id="overview" class="synopsis"></div>

        <div id="cast-section" style="display:none;">
            <div class="section-label">Cast Principal</div>
            <div id="cast-list" class="cast-list"></div>
        </div>

        <div id="similar-section" style="display:none;">
            <div class="section-label">Películas Similares</div>
            <div id="similar-grid" class="similar-grid"></div>
        </div>

        <div class="controls-footer">
            <div class="filter-row">
                <select id="filter-genre">
                    <option value="">Géneros</option>
                    <option value="28">Acción</option><option value="12">Aventura</option><option value="16">Animación</option>
                    <option value="35">Comedia</option><option value="80">Crimen</option><option value="99">Documental</option>
                    <option value="18">Drama</option><option value="14">Fantasía</option><option value="27">Terror</option>
                    <option value="9648">Misterio</option><option value="878">Ciencia Ficción</option><option value="53">Thriller</option>
                </select>
                <select id="filter-decade">
                    <option value="">Años</option>
                    <option value="2020">2020s</option><option value="2010">2010s</option><option value="2000">2000s</option>
                    <option value="1990">1990s</option><option value="1980">1980s</option><option value="1970">1970s</option>
                    <option value="1960">1960s</option>
                </select>
            </div>
            <button class="btn-sortear" id="btn-sortear" onclick="sortear()">¡Sorteo Aleatorio!</button>
        </div>
    </div>

    <script>
        const API_KEY = 'b9911fb46e0e11491607c279cce876a1';

        async function loadMovie(movieId) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            try {
                const [det, vid, sim] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=${API_KEY}&language=es-MX&append_to_response=credits`),
                    fetch(`https://api.themoviedb.org/3/movie/${movieId}/videos?api_key=${API_KEY}`),
                    fetch(`https://api.themoviedb.org/3/movie/${movieId}/similar?api_key=${API_KEY}&language=es-MX`)
                ]);
                const details = await det.json();
                const videos = await vid.json();
                const similar = await sim.json();

                document.getElementById('hero').style.display = 'block';
                document.getElementById('movie-info').style.display = 'flex';
                document.getElementById('cast-section').style.display = 'block';
                document.getElementById('similar-section').style.display = 'block';

                if(details.backdrop_path) document.getElementById('hero').style.backgroundImage = `url(https://image.tmdb.org/t/p/w1280${details.backdrop_path})`;
                document.getElementById('title').innerText = details.title;
                document.getElementById('poster').src = `https://image.tmdb.org/t/p/w500${details.poster_path}`;
                document.getElementById('year').innerText = details.release_date.split('-')[0];
                document.getElementById('runtime').innerText = details.runtime + " min";
                document.getElementById('overview').innerText = details.overview || "Sinopsis no disponible.";
                
                const rating = Math.round(details.vote_average / 2);
                document.getElementById('stars').innerHTML = '★'.repeat(rating) + '<span style="opacity:0.2">' + '★'.repeat(5-rating) + '</span>';

                const dir = details.credits.crew.find(c => c.job === 'Director');
                document.getElementById('director').innerText = dir ? dir.name : 'Desconocido';

                document.getElementById('cast-list').innerHTML = details.credits.cast.slice(0, 8).map(a => `
                    <div class="cast-item">
                        <img src="${a.profile_path ? 'https://image.tmdb.org/t/p/w185' + a.profile_path : 'https://via.placeholder.com/50'}" class="cast-img">
                        <span class="cast-name">${a.name}</span>
                    </div>`).join('');

                const trailer = videos.results.find(v => v.type === 'Trailer');
                document.getElementById('btn-trailer').href = trailer ? `https://youtube.com/watch?v=${trailer.key}` : '#';
                document.getElementById('btn-jw').href = `https://www.justwatch.com/ar/buscar?q=${encodeURIComponent(details.title)}`;

                document.getElementById('similar-grid').innerHTML = similar.results.slice(0, 6).map(m => `
                    <div class="similar-item" onclick="loadMovie(${m.id})">
                        <img src="https://image.tmdb.org/t/p/w342${m.poster_path}">
                    </div>`).join('');
            } catch (e) { console.error(e); }
        }

        async function buscar() {
            const query = document.getElementById('search-input').value;
            if(!query) return;
            const resp = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${API_KEY}&language=es-MX&query=${encodeURIComponent(query)}`);
            const data = await resp.json();
            const movie = data.results.find(r => r.media_type === 'movie' || r.media_type === 'person');
            if(movie && movie.media_type === 'movie') loadMovie(movie.id);
            else if(movie && movie.known_for) loadMovie(movie.known_for[0].id);
        }

        async function sortear() {
            const genre = document.getElementById('filter-genre').value;
            const decade = document.getElementById('filter-decade').value;
            let url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=es-MX&sort_by=vote_count.desc&page=${Math.floor(Math.random() * 10) + 1}`;
            if (genre) url += `&with_genres=${genre}`;
            if (decade) url += `&primary_release_date.gte=${decade}-01-01&primary_release_date.lte=${parseInt(decade)+9}-12-31`;
            const resp = await fetch(url);
            const data = await resp.json();
            const movie = data.results[Math.floor(Math.random() * data.results.length)];
            if (movie) loadMovie(movie.id);
        }
    </script>
</body>
</html>
