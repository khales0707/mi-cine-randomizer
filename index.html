<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Randomizer - @mundoo.cine</title>
    <style>
        :root { --primary: #6c70b0; --accent: #ffb400; --bg: #0a0a0a; }

        body { 
            font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; background-color: var(--bg); color: white;
            display: flex; justify-content: center; min-height: 100vh;
        }

        /* BANNER SUPERIOR CON DESVANECIDO */
        #movie-banner {
            position: fixed; top: 0; left: 0; width: 100%; height: 60vh;
            background-size: cover; background-position: center top;
            z-index: -1; transition: 1s ease-in-out;
        }
        #movie-banner::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(10,10,10,0.2) 0%, rgba(10,10,10,1) 95%);
        }

        .container { width: 95%; max-width: 900px; padding: 40px 0; z-index: 10; }

        /* CABECERA */
        .header { text-align: center; margin-bottom: 40px; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--primary); margin-bottom: 10px; }
        .username { font-weight: bold; font-size: 1.1rem; letter-spacing: 1px; margin: 0; }
        
        .social-container { display: flex; gap: 20px; justify-content: center; margin: 15px 0; }
        .social-icon { width: 20px; height: 20px; fill: white; transition: 0.3s; }
        .social-icon:hover { transform: scale(1.2); }

        /* FILTROS */
        .filters { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; }
        select {
            background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 15px; border-radius: 8px; cursor: pointer; backdrop-filter: blur(5px);
        }
        select option { background-color: #1a1a1a; color: white; }

        /* CONTENIDO DE PELÍCULA */
        .movie-card {
            display: none; grid-template-columns: 300px 1fr; gap: 40px;
            background: rgba(255,255,255,0.03); padding: 30px; border-radius: 20px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.8s ease;
        }

        .poster-side img { width: 100%; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .info-side { display: flex; flex-direction: column; max-height: 450px; } /* Altura similar al poster */
        .title-area h1 { margin: 0; font-size: 2.2rem; line-height: 1.1; }
        .meta { margin: 10px 0; color: #aaa; font-size: 0.9rem; }
        .rating { color: var(--accent); font-weight: bold; font-size: 1.2rem; margin-bottom: 15px; }

        /* SINOPSIS CON SCROLL */
        .synopsis-container { 
            overflow-y: auto; padding-right: 15px; margin-bottom: 20px; 
            font-size: 1rem; line-height: 1.6; color: #ddd; flex-grow: 1;
        }
        .synopsis-container::-webkit-scrollbar { width: 4px; }
        .synopsis-container::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .actions { display: flex; gap: 10px; margin-top: auto; }
        .btn-small {
            padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold;
            font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.2); color: white; transition: 0.3s;
        }
        .btn-small:hover { background: white; color: black; }

        /* BOTÓN PRINCIPAL */
        .btn-main {
            display: block; width: 100%; max-width: 300px; margin: 30px auto;
            padding: 18px; border-radius: 12px; border: none; background: var(--primary);
            color: white; font-weight: bold; font-size: 1rem; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .btn-main:hover { background: #7b7fc2; transform: translateY(-3px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; } }

        @media (max-width: 700px) {
            .movie-card { grid-template-columns: 1fr; text-align: center; }
            .info-side { max-height: none; }
            .actions { justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="movie-banner"></div>

    <div class="container">
        <div class="header">
            <img src="avatar.jpg" class="avatar">
            <p class="username">mundoo.cine</p>
            <div class="social-container">
                <a href="https://instagram.com/mundoo.cine" target="_blank"><svg class="social-icon" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.073-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></a>
                <a href="https://boxd.it/37NZT" target="_blank"><svg class="social-icon" viewBox="0 0 38 38"><circle fill="#00E054" cx="7" cy="19" r="7"/><circle fill="#FF8000" cx="19" cy="19" r="7"/><circle fill="#40BCF4" cx="31" cy="19" r="7"/></svg></a>
            </div>
            <h2 style="font-size: 2.5rem; margin-top: 10px;">¿Qué miramos hoy?</h2>
        </div>

        <div class="filters">
            <select id="filter-genre">
                <option value="">Cualquier Género</option>
                <option value="28">Acción</option><option value="16">Animadas</option><option value="35">Comedia</option>
                <option value="27">Terror</option><option value="53">Thriller</option><option value="878">Ciencia Ficción</option>
            </select>
            <select id="filter-decade">
                <option value="">Cualquier Año</option>
                <option value="2020">2020s</option><option value="2010">2010s</option><option value="2000">2000s</option>
            </select>
        </div>

        <div id="movie-card" class="movie-card">
            <div class="poster-side">
                <img id="poster" src="" alt="Poster">
            </div>
            <div class="info-side">
                <div class="title-area">
                    <h1 id="title"></h1>
                    <div class="meta">
                        <span id="year"></span> • <span id="director"></span>
                    </div>
                </div>
                <div id="rating" class="rating"></div>
                
                <div class="synopsis-container" id="overview"></div>

                <div class="actions">
                    <a id="btn-trailer" href="#" target="_blank" class="btn-small">TRAILER</a>
                    <a id="btn-jw" href="#" target="_blank" class="btn-small">DONDE VER</a>
                </div>
            </div>
        </div>

        <button class="btn-main" id="btn-sortear" onclick="sortear()">¡Sorprendeme!</button>
    </div>

    <script>
        const API_KEY = 'b9911fb46e0e11491607c279cce876a1';
        
        async function sortear() {
            const btn = document.getElementById('btn-sortear');
            const genre = document.getElementById('filter-genre').value;
            const decade = document.getElementById('filter-decade').value;
            
            btn.innerText = "BUSCANDO...";
            btn.disabled = true;

            try {
                let url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=es-MX&sort_by=vote_count.desc&include_adult=false&page=${Math.floor(Math.random() * 5) + 1}`;
                if (genre) url += `&with_genres=${genre}`;
                if (decade) url += `&primary_release_date.gte=${decade}-01-01&primary_release_date.lte=${parseInt(decade)+9}-12-31`;

                const resp = await fetch(url);
                const data = await resp.json();
                const movie = data.results[Math.floor(Math.random() * data.results.length)];

                if (movie) {
                    const [detailResp, videoResp] = await Promise.all([
                        fetch(`https://api.themoviedb.org/3/movie/${movie.id}?api_key=${API_KEY}&language=es-MX&append_to_response=credits`),
                        fetch(`https://api.themoviedb.org/3/movie/${movie.id}/videos?api_key=${API_KEY}`)
                    ]);
                    const details = await detailResp.json();
                    const videos = await videoResp.json();

                    // Aplicar Banner y Poster
                    if(details.backdrop_path) {
                        document.getElementById('movie-banner').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${details.backdrop_path})`;
                    }
                    document.getElementById('poster').src = `https://image.tmdb.org/t/p/w500${movie.poster_path}`;
                    
                    // Llenar datos
                    document.getElementById('title').innerText = movie.title;
                    document.getElementById('year').innerText = movie.release_date.split('-')[0];
                    document.getElementById('rating').innerText = `★ ${movie.vote_average.toFixed(1)}`;
                    document.getElementById('overview').innerText = movie.overview || "Sinopsis no disponible.";
                    
                    const dir = details.credits.crew.find(c => c.job === 'Director');
                    document.getElementById('director').innerText = dir ? dir.name : 'Director desconocido';

                    // Botones
                    const trailer = videos.results.find(v => v.type === 'Trailer');
                    document.getElementById('btn-trailer').href = trailer ? `https://youtube.com/watch?v=${trailer.key}` : '#';
                    document.getElementById('btn-jw').href = `https://www.justwatch.com/ar/buscar?q=${encodeURIComponent(movie.title)}`;

                    document.getElementById('movie-card').style.display = 'grid';
                }
            } catch (e) { console.error(e); }

            btn.innerText = "¡SORPRENDEME!";
            btn.disabled = false;
        }
    </script>
</body>
</html>
