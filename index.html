<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Randomizer - @mundoo.cine</title>
    <style>
        :root { --primary: #6c70b0; --bg-card: rgba(15, 15, 15, 0.9); --accent: #ffb400; }

        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; display: flex; align-items: center; justify-content: center; 
            min-height: 100vh; color: white; background: #000; overflow-x: hidden;
            background-image: url('fondo.jpg'); background-size: cover; background-position: center;
        }

        .card {
            background-color: var(--bg-card); 
            border-radius: 32px; overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            max-width: 850px; width: 92%; 
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center; margin: 40px auto;
            backdrop-filter: blur(20px);
        }

        /* HEADER DENTRO DE LA CAJA */
        .card-header { padding: 30px 30px 10px 30px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; margin-bottom: 10px; }
        .username { font-size: 1.2rem; font-weight: bold; margin: 0; opacity: 0.9; }
        
        .social-container { display: flex; gap: 20px; margin: 15px 0 25px 0; justify-content: center; align-items: center; }
        .social-icon { width: 22px; height: 22px; transition: 0.3s; }
        .social-icon:hover { transform: translateY(-3px) scale(1.1); }

        /* BANNER INTERNO */
        #movie-banner {
            width: 100%; height: 250px; background-size: cover; background-position: center;
            display: none; position: relative;
        }
        #movie-banner::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, var(--bg-card), transparent);
        }

        /* CONTENIDO PRINCIPAL */
        .movie-main-content { 
            display: none; padding: 20px 35px 35px 35px; 
            grid-template-columns: 200px 1fr; gap: 30px; text-align: left;
            animation: fadeIn 0.6s ease;
        }

        .poster-side img { width: 100%; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .info-side { display: flex; flex-direction: column; }
        h1#movie-title { font-size: 1.8rem; margin: 0; line-height: 1.2; }
        .year-tag { color: #999; font-weight: 300; margin-left: 8px; font-size: 1.3rem; }
        .rating-tag { color: var(--accent); font-weight: bold; font-size: 1.1rem; margin: 10px 0; }

        /* SINOPSIS CON SCROLL */
        .synopsis-scroll {
            max-height: 120px; overflow-y: auto; font-size: 0.95rem; 
            line-height: 1.5; color: #ccc; margin-bottom: 20px; padding-right: 10px;
        }
        .synopsis-scroll::-webkit-scrollbar { width: 4px; }
        .synopsis-scroll::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .label { color: var(--primary); font-weight: bold; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1.5px; margin-top: 10px; display: block; }
        
        .cast-container { display: flex; gap: 12px; margin-top: 8px; flex-wrap: wrap; }
        .actor-item { text-align: center; width: 55px; }
        .actor-img { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        .actor-name { font-size: 0.6rem; color: #aaa; display: block; margin-top: 4px; line-height: 1.1; }

        .actions-row { display: flex; gap: 10px; margin-top: 20px; }
        .btn-action {
            padding: 10px 16px; border-radius: 10px; text-decoration: none; font-size: 0.8rem;
            font-weight: bold; border: 1px solid rgba(255,255,255,0.1); color: white;
            background: rgba(255,255,255,0.05); transition: 0.3s;
        }
        .btn-action:hover { background: white; color: black; }

        /* FILTROS Y BOTÓN */
        .filters-area { padding: 0 30px 30px 30px; }
        .select-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; }
        select {
            background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 15px; border-radius: 12px; cursor: pointer;
        }
        select option { background: #222; color: white; }

        .btn-sortear {
            background: var(--primary); color: white; border: none; padding: 20px;
            width: 100%; max-width: 400px; border-radius: 18px; font-weight: bold;
            font-size: 1.1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: 0.4s; box-shadow: 0 10px 20px rgba(108,112,176,0.3);
        }
        .btn-sortear:hover { background: #7b7fc2; transform: translateY(-3px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 700px) {
            .movie-main-content { grid-template-columns: 1fr; text-align: center; }
            .poster-side img { max-width: 180px; margin: 0 auto; }
            .synopsis-scroll { text-align: left; }
            .actions-row { justify-content: center; }
            .cast-container { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <img src="avatar.jpg" class="avatar">
            <p class="username">mundoo.cine</p>
            <div class="social-container">
                <a href="https://www.instagram.com/mundoo.cine" target="_blank">
                    <svg class="social-icon" viewBox="0 0 24 24">
                        <defs><radialGradient id="ig-grad" r="150%" cx="30%" cy="107%"><stop stop-color="#fdf497" offset="0"/><stop stop-color="#fd5949" offset="0.45"/><stop stop-color="#d6249f" offset="0.6"/><stop stop-color="#285AEB" offset="0.9"/></radialGradient></defs>
                        <path fill="url(#ig-grad)" d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.073-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
                    </svg>
                </a>
                <a href="https://boxd.it/37NZT" target="_blank"><svg class="social-icon" viewBox="0 0 38 38"><circle fill="#00E054" cx="7" cy="19" r="7"/><circle fill="#FF8000" cx="19" cy="19" r="7"/><circle fill="#40BCF4" cx="31" cy="19" r="7"/></svg></a>
                <a href="https://x.com/soy_Khales" target="_blank">
                    <svg class="social-icon" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                </a>
            </div>
            <h2 id="initial-title" style="margin: 0; font-size: 2.2rem;">¿Qué miramos hoy?</h2>
        </div>

        <div id="movie-banner"></div>

        <div id="movie-content" class="movie-main-content">
            <div class="poster-side">
                <img id="poster" src="" alt="Poster">
            </div>
            <div class="info-side">
                <h1 id="movie-title-full">
                    <span id="title"></span>
                    <span id="year" class="year-tag"></span>
                </h1>
                <div id="rating" class="rating-tag"></div>
                
                <div id="overview" class="synopsis-scroll"></div>

                <div id="director-box">
                    <span class="label">Dirección</span>
                    <div id="director" style="font-weight: 500; margin-top: 5px;"></div>
                </div>

                <span class="label">Reparto</span>
                <div id="cast" class="cast-container"></div>

                <div class="actions-row">
                    <a id="btn-trailer" href="#" target="_blank" class="btn-action">▶ Tráiler</a>
                    <a id="btn-jw" href="#" target="_blank" class="btn-action">📺 JustWatch</a>
                </div>
            </div>
        </div>

        <div class="filters-area">
            <div class="select-group">
                <select id="filter-genre">
                    <option value="">Géneros</option>
                    <option value="28">Acción</option><option value="16">Animadas</option><option value="35">Comedia</option>
                    <option value="27">Terror</option><option value="53">Thriller</option><option value="878">Ciencia Ficción</option>
                    <option value="18">Drama</option>
                </select>
                <select id="filter-decade">
                    <option value="">Años</option>
                    <option value="2020">2020s</option><option value="2010">2010s</option><option value="2000">2000s</option>
                    <option value="1990">1990s</option><option value="1980">1980s</option>
                </select>
            </div>
            <button class="btn-sortear" id="btn-sortear" onclick="sortear()">¡Sorprendeme!</button>
        </div>
    </div>

    <script>
        const API_KEY = 'b9911fb46e0e11491607c279cce876a1';
        let peliculas = [];

        async function cargarPeliculas() {
            try { const r = await fetch('peliculas.json'); peliculas = await r.json(); } 
            catch (e) { console.warn("No se encontró peliculas.json, usando modo API"); }
        }
        cargarPeliculas();

        async function sortear() {
            const btn = document.getElementById('btn-sortear');
            const genre = document.getElementById('filter-genre').value;
            const decade = document.getElementById('filter-decade').value;
            
            btn.innerText = "BUSCANDO...";
            btn.disabled = true;

            try {
                let movieData;
                if (genre || decade || peliculas.length === 0) {
                    let url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=es-MX&sort_by=vote_count.desc&include_adult=false&page=${Math.floor(Math.random() * 4) + 1}`;
                    if (genre) url += `&with_genres=${genre}`;
                    if (decade) url += `&primary_release_date.gte=${decade}-01-01&primary_release_date.lte=${parseInt(decade)+9}-12-31`;
                    const r = await fetch(url);
                    const d = await r.json();
                    movieData = d.results[Math.floor(Math.random() * d.results.length)];
                } else {
                    const sel = peliculas[Math.floor(Math.random() * peliculas.length)];
                    const r = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(sel)}&language=es-MX`);
                    const d = await r.json();
                    movieData = d.results[0];
                }

                if (movieData) {
                    const [det, vid] = await Promise.all([
                        fetch(`https://api.themoviedb.org/3/movie/${movieData.id}?api_key=${API_KEY}&language=es-MX&append_to_response=credits`),
                        fetch(`https://api.themoviedb.org/3/movie/${movieData.id}/videos?api_key=${API_KEY}`)
                    ]);
                    const details = await det.json();
                    const videos = await vid.json();

                    document.getElementById('initial-title').style.display = 'none';
                    document.getElementById('movie-banner').style.display = 'block';
                    document.getElementById('movie-content').style.display = 'grid';

                    // Imagenes
                    if(details.backdrop_path) document.getElementById('movie-banner').style.backgroundImage = `url(https://image.tmdb.org/t/p/w1280${details.backdrop_path})`;
                    document.getElementById('poster').src = `https://image.tmdb.org/t/p/w500${movieData.poster_path}`;

                    // Textos
                    document.getElementById('title').innerText = movieData.title;
                    document.getElementById('year').innerText = movieData.release_date ? `(${movieData.release_date.split('-')[0]})` : '';
                    document.getElementById('rating').innerText = `★ ${movieData.vote_average.toFixed(1)}`;
                    document.getElementById('overview').innerText = movieData.overview || "Sinopsis no disponible.";
                    
                    const dir = details.credits.crew.find(c => c.job === 'Director');
                    document.getElementById('director').innerText = dir ? dir.name : 'No disponible';

                    // Cast (Recuperado)
                    document.getElementById('cast').innerHTML = details.credits.cast.slice(0, 4).map(a => `
                        <div class="actor-item">
                            <img src="${a.profile_path ? 'https://image.tmdb.org/t/p/w185' + a.profile_path : 'https://via.placeholder.com/60'}" class="actor-img">
                            <span class="actor-name">${a.name}</span>
                        </div>`).join('');

                    // Botones (Recuperados)
                    const trailer = videos.results.find(v => v.type === 'Trailer');
                    const btnT = document.getElementById('btn-trailer');
                    if (trailer) { btnT.href = `https://youtube.com/watch?v=${trailer.key}`; btnT.style.display = 'inline-block'; } 
                    else { btnT.style.display = 'none'; }
                    
                    document.getElementById('btn-jw').href = `https://www.justwatch.com/ar/buscar?q=${encodeURIComponent(movieData.title)}`;
                }
            } catch (e) { console.error(e); }

            btn.innerText = "¡Sorprendeme!";
            btn.disabled = false;
        }
    </script>
</body>
</html>
