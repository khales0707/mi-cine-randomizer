<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Randomizer - @mundoo.cine</title>
    <style>
        :root { 
            --primary: #6c70b0; 
            --bg-color: #14181c; 
            --text-main: #ffffff; 
            --text-sec: #9ab; 
            --yt-red: #ff0000;
            --jw-yellow: #fbc02d;
        }

        /* FONDO MEJORADO - Sin imágenes estiradas */
        body { 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            margin: 0; background-color: var(--bg-color); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden; position: relative;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.05; pointer-events: none; z-index: 1000;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .main-wrapper { width: 92%; max-width: 750px; padding: 30px 0; position: relative; z-index: 10; }

        /* HEADER USUARIO */
        .user-header { text-align: center; margin-bottom: 25px; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; border: 1.5px solid var(--primary); margin-bottom: 8px; }
        .social-row { display: flex; justify-content: center; gap: 18px; margin-top: 10px; }
        .social-icon { width: 18px; height: 18px; transition: 0.3s; opacity: 0.8; }
        .social-icon:hover { opacity: 1; transform: translateY(-2px); }

        /* BANNER */
        .hero-banner {
            width: 100%; height: 320px; background-size: cover; background-position: center;
            border-radius: 12px; position: relative; display: none;
        }
        .hero-banner::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 101%;
            background: linear-gradient(to bottom, transparent 20%, var(--bg-color) 100%);
        }

        /* MOVIE INFO - DISEÑO INVERSO */
        .movie-header { 
            display: none; align-items: flex-end; gap: 25px; 
            margin-top: -90px; position: relative; z-index: 20; padding: 0 5px; 
        }

        .poster-container { flex: 0 0 130px; }
        .poster-img { width: 100%; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.6); }

        .info-container { flex: 1; }
        .movie-title h1 { font-size: 1.7rem; margin: 0; font-weight: 800; line-height: 1.1; letter-spacing: -0.5px; }
        .movie-meta { color: var(--text-sec); font-size: 0.8rem; margin-top: 6px; letter-spacing: 0.5px; }
        .movie-meta span { color: #eee; font-weight: 500; }
        
        .stars-container { color: var(--primary); font-size: 0.9rem; margin-top: 5px; letter-spacing: 2px; }

        /* BOTONES CON COLORES DINÁMICOS */
        .btn-group { display: flex; gap: 8px; margin: 15px 0; flex-wrap: wrap; }
        .btn-app {
            background: #2c3440; color: #ddd; border: none; padding: 8px 14px; border-radius: 5px;
            font-size: 0.75rem; font-weight: 600; cursor: pointer; text-decoration: none; 
            display: flex; align-items: center; gap: 6px; transition: 0.3s; text-transform: uppercase;
        }
        .btn-trailer:hover { background: var(--yt-red) !important; color: white; }
        .btn-jw:hover { background: var(--jw-yellow) !important; color: black; }

        .synopsis { font-size: 0.95rem; line-height: 1.5; color: #ccddee; margin: 25px 0; text-align: justify; }

        /* SECCIONES SECUNDARIAS */
        .section-label { font-size: 0.7rem; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid #2c3440; padding-bottom: 8px; margin-bottom: 15px; }
        
        .cast-list { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .cast-item { min-width: 60px; text-align: center; }
        .cast-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 1px solid #334455; }
        .cast-name { font-size: 0.65rem; color: var(--text-sec); display: block; margin-top: 5px; line-height: 1.1; }

        .similar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; }
        .similar-item { cursor: pointer; transition: 0.3s; }
        .similar-item:hover { transform: translateY(-5px); opacity: 0.8; }
        .similar-item img { width: 100%; border-radius: 4px; }

        /* FOOTER CONTROLES */
        .controls-footer { text-align: center; margin-top: 50px; padding: 30px 15px; background: rgba(0,0,0,0.2); border-radius: 15px; }
        .filter-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
        select { background: #2c3440; color: white; border: none; padding: 10px 14px; border-radius: 6px; font-size: 0.85rem; outline: none; }
        
        .btn-sortear {
            background: var(--primary); color: white; border: none; padding: 18px;
            border-radius: 10px; font-weight: bold; font-size: 1rem; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; width: 100%; max-width: 400px;
            transition: 0.3s;
        }
        .btn-sortear:hover { background: #7b7fc2; }

        /* RESPONSIVE */
        @media (max-width: 500px) {
            .movie-header { align-items: center; }
            .poster-container { flex: 0 0 100px; }
            .movie-title h1 { font-size: 1.4rem; }
            .btn-group { flex-direction: column; }
            .btn-app { width: fit-content; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="user-header">
            <img src="avatar.jpg" class="avatar">
            <p style="margin: 0; font-weight: 700; font-size: 0.9rem; opacity: 0.9;">@mundoo.cine</p>
            <div class="social-row">
                <a href="https://instagram.com/mundoo.cine" target="_blank"><svg class="social-icon" viewBox="0 0 24 24"><defs><radialGradient id="ig-grad" r="150%" cx="30%" cy="107%"><stop stop-color="#fdf497" offset="0"/><stop stop-color="#fd5949" offset="0.45"/><stop stop-color="#d6249f" offset="0.6"/><stop stop-color="#285AEB" offset="0.9"/></radialGradient></defs><path fill="url(#ig-grad)" d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.073-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></a>
                <a href="https://boxd.it/37NZT" target="_blank"><svg class="social-icon" viewBox="0 0 38 38"><circle fill="#00E054" cx="7" cy="19" r="7"/><circle fill="#FF8000" cx="19" cy="19" r="7"/><circle fill="#40BCF4" cx="31" cy="19" r="7"/></svg></a>
                <a href="https://x.com/soy_Khales" target="_blank"><svg class="social-icon" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
            </div>
        </div>

        <div id="hero" class="hero-banner"></div>

        <div id="movie-info" class="movie-header">
            <div class="poster-container">
                <img id="poster" src="" class="poster-img">
            </div>
            <div class="info-container">
                <div id="stars" class="stars-container"></div>
                <div class="movie-title">
                    <h1 id="title"></h1>
                    <div class="movie-meta">
                        <span id="year"></span> · Dirigido por<br>
                        <span id="director" style="font-size: 1.1rem; text-transform: none; letter-spacing: 0;"></span>
                    </div>
                </div>
                <div class="btn-group">
                    <a id="btn-trailer" href="#" target="_blank" class="btn-app btn-trailer">▶ Tráiler</a>
                    <a id="btn-jw" href="#" target="_blank" class="btn-app btn-jw">📺 ¿Dónde verla?</a>
                </div>
            </div>
        </div>

        <div id="overview" class="synopsis"></div>

        <div id="cast-section" style="display:none;">
            <div class="section-label">Reparto Principal</div>
            <div id="cast-list" class="cast-list"></div>
        </div>

        <div id="similar-section" style="display:none;">
            <div class="section-label">Películas similares</div>
            <div id="similar-grid" class="similar-grid"></div>
        </div>

        <div class="controls-footer">
            <h3 id="welcome-text" style="margin-top: 0; font-size: 1.1rem; opacity: 0.8; font-weight: 400;">¿Qué miramos hoy?</h3>
            <div class="filter-row">
                <select id="filter-genre">
                    <option value="">Género</option>
                    <option value="28">Acción</option><option value="12">Aventura</option><option value="16">Animación</option>
                    <option value="35">Comedia</option><option value="80">Crimen</option><option value="18">Drama</option>
                    <option value="27">Terror</option><option value="878">Sci-Fi</option><option value="53">Thriller</option>
                </select>
                <select id="filter-decade">
                    <option value="">Año</option>
                    <option value="2020">2020s</option><option value="2010">2010s</option><option value="2000">2000s</option>
                    <option value="1990">1990s</option><option value="1980">1980s</option>
                </select>
            </div>
            <button class="btn-sortear" id="btn-sortear" onclick="sortear()">¡Sorprendeme!</button>
        </div>
    </div>

    <script>
        const API_KEY = 'b9911fb46e0e11491607c279cce876a1';

        function getStars(rating) {
            const starsCount = Math.round(rating / 2);
            return '★'.repeat(starsCount) + '<span style="opacity:0.2">' + '★'.repeat(5 - starsCount) + '</span>';
        }

        async function loadMovie(movieId) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            try {
                const [det, vid, sim] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=${API_KEY}&language=es-MX&append_to_response=credits`),
                    fetch(`https://api.themoviedb.org/3/movie/${movieId}/videos?api_key=${API_KEY}`),
                    fetch(`https://api.themoviedb.org/3/movie/${movieId}/similar?api_key=${API_KEY}&language=es-MX`)
                ]);
                const details = await det.json();
                const videos = await vid.json();
                const similar = await sim.json();

                document.getElementById('hero').style.display = 'block';
                document.getElementById('movie-info').style.display = 'flex';
                document.getElementById('cast-section').style.display = 'block';
                document.getElementById('similar-section').style.display = 'block';

                if(details.backdrop_path) document.getElementById('hero').style.backgroundImage = `url(https://image.tmdb.org/t/p/w1280${details.backdrop_path})`;
                document.getElementById('title').innerText = details.title;
                document.getElementById('poster').src = `https://image.tmdb.org/t/p/w500${details.poster_path}`;
                document.getElementById('year').innerText = details.release_date.split('-')[0];
                document.getElementById('overview').innerText = details.overview || "Sinopsis no disponible.";
                document.getElementById('stars').innerHTML = getStars(details.vote_average);
                
                const dir = details.credits.crew.find(c => c.job === 'Director');
                document.getElementById('director').innerText = dir ? dir.name : 'Desconocido';

                document.getElementById('cast-list').innerHTML = details.credits.cast.slice(0, 6).map(a => `
                    <div class="cast-item">
                        <img src="${a.profile_path ? 'https://image.tmdb.org/t/p/w185' + a.profile_path : 'https://via.placeholder.com/60'}" class="cast-img">
                        <span class="cast-name">${a.name}</span>
                    </div>`).join('');

                const trailer = videos.results.find(v => v.type === 'Trailer');
                document.getElementById('btn-trailer').href = trailer ? `https://youtube.com/watch?v=${trailer.key}` : '#';
                document.getElementById('btn-jw').href = `https://www.justwatch.com/ar/buscar?q=${encodeURIComponent(details.title)}`;

                document.getElementById('similar-grid').innerHTML = similar.results.slice(0, 6).map(m => `
                    <div class="similar-item" onclick="loadMovie(${m.id})">
                        <img src="https://image.tmdb.org/t/p/w342${m.poster_path}">
                    </div>`).join('');

            } catch (e) { console.error(e); }
        }

        async function sortear() {
            const btn = document.getElementById('btn-sortear');
            const genre = document.getElementById('filter-genre').value;
            const decade = document.getElementById('filter-decade').value;
            btn.innerText = "BUSCANDO...";
            btn.disabled = true;

            try {
                let url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=es-MX&sort_by=vote_count.desc&include_adult=false&page=${Math.floor(Math.random() * 5) + 1}`;
                if (genre) url += `&with_genres=${genre}`;
                if (decade) url += `&primary_release_date.gte=${decade}-01-01&primary_release_date.lte=${parseInt(decade)+9}-12-31`;

                const resp = await fetch(url);
                const data = await resp.json();
                const movie = data.results[Math.floor(Math.random() * data.results.length)];
                if (movie) await loadMovie(movie.id);
            } catch (e) { console.error(e); }

            btn.innerText = "¡SORPRENDEME!";
            btn.disabled = false;
        }
    </script>
</body>
</html>
