<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Randomizer - @mundoo.cine</title>
    <style>
        :root { 
            --primary: #6c70b0; 
            --bg-color: #14181c; 
            --text-main: #ffffff; 
            --text-sec: #9ab; 
            --accent-green: #00e054;
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; background-color: var(--bg-color); color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        /* TEXTURA DE GRANO (NOISE) */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.04; pointer-events: none; z-index: 999;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .main-wrapper { width: 95%; max-width: 800px; padding: 40px 0; position: relative; z-index: 10; }

        /* CABECERA DE USUARIO */
        .user-header { text-align: center; margin-bottom: 30px; }
        .avatar { width: 75px; height: 75px; border-radius: 50%; border: 2px solid var(--primary); margin-bottom: 12px; object-fit: cover; }
        .social-row { display: flex; justify-content: center; gap: 20px; margin-top: 15px; }
        .social-icon { width: 22px; height: 22px; transition: 0.3s; cursor: pointer; }
        .social-icon:hover { transform: translateY(-3px); }

        /* BANNER SUPERIOR CON DESVANECIDO */
        .hero-banner {
            width: 100%; height: 380px; background-size: cover; background-position: center;
            border-radius: 16px; position: relative; display: none; margin-bottom: 20px;
            animation: fadeIn 1s ease;
        }
        .hero-banner::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 10%, var(--bg-color) 98%);
        }

        /* INFO DE PELÍCULA */
        .movie-header { display: none; grid-template-columns: 1fr 150px; gap: 30px; margin-top: -100px; position: relative; z-index: 20; padding: 0 10px; }
        .movie-title h1 { font-size: 2.8rem; margin: 0; line-height: 1.1; font-weight: 900; letter-spacing: -1px; }
        .movie-meta { color: var(--text-sec); text-transform: uppercase; font-size: 0.85rem; margin-top: 12px; letter-spacing: 1.5px; }
        .movie-meta span { color: white; font-weight: bold; }
        
        .poster-img { width: 100%; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 15px 40px rgba(0,0,0,0.7); }

        /* BOTONES DE ACCIÓN */
        .btn-group { display: flex; gap: 12px; margin: 25px 0; }
        .btn-app {
            background: #2c3440; color: white; border: none; padding: 12px 20px; border-radius: 8px;
            font-size: 0.8rem; font-weight: bold; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-app:hover { background: #445566; color: white; }

        .synopsis { font-size: 1.05rem; line-height: 1.6; color: #ccddee; margin: 30px 0 40px 0; padding: 0 10px; }

        /* SECCIONES SECUNDARIAS */
        .section-label { font-size: 0.75rem; color: var(--text-sec); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #2c3440; padding-bottom: 10px; margin-bottom: 20px; }
        
        .cast-list { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; }
        .cast-item { min-width: 70px; text-align: center; }
        .cast-img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 1px solid #445566; }
        .cast-name { font-size: 0.7rem; color: var(--text-sec); display: block; margin-top: 8px; line-height: 1.2; }

        .similar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; margin-top: 20px; }
        .similar-item { cursor: pointer; transition: 0.4s; position: relative; }
        .similar-item:hover { transform: scale(1.05); z-index: 5; }
        .similar-item img { width: 100%; border-radius: 6px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* CONTROLES INFERIORES */
        .controls-footer { text-align: center; margin-top: 60px; padding: 40px 20px; background: rgba(0,0,0,0.2); border-radius: 20px; }
        .filter-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; }
        select { background: #2c3440; color: white; border: 1px solid rgba(255,255,255,0.1); padding: 12px 18px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        
        .btn-sortear {
            background: var(--primary); color: white; border: none; padding: 22px;
            border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; width: 100%; max-width: 450px;
            transition: 0.3s; box-shadow: 0 10px 30px rgba(108,112,176,0.2);
        }
        .btn-sortear:hover { background: #7b7fc2; transform: translateY(-2px); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 650px) {
            .movie-header { grid-template-columns: 1fr; text-align: center; margin-top: -60px; }
            .poster-img { width: 140px; margin: 0 auto; order: -1; }
            .btn-group { justify-content: center; }
            .movie-title h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="user-header">
            <img src="avatar.jpg" class="avatar" alt="Avatar">
            <p style="margin: 0; font-weight: bold; font-size: 1.1rem;">@mundoo.cine</p>
            <div class="social-row">
                <a href="https://instagram.com/mundoo.cine" target="_blank"><svg class="social-icon" viewBox="0 0 24 24"><defs><radialGradient id="ig-grad" r="150%" cx="30%" cy="107%"><stop stop-color="#fdf497" offset="0"/><stop stop-color="#fd5949" offset="0.45"/><stop stop-color="#d6249f" offset="0.6"/><stop stop-color="#285AEB" offset="0.9"/></radialGradient></defs><path fill="url(#ig-grad)" d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.073-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg></a>
                <a href="https://boxd.it/37NZT" target="_blank"><svg class="social-icon" viewBox="0 0 38 38"><circle fill="#00E054" cx="7" cy="19" r="7"/><circle fill="#FF8000" cx="19" cy="19" r="7"/><circle fill="#40BCF4" cx="31" cy="19" r="7"/></svg></a>
                <a href="https://x.com/soy_Khales" target="_blank"><svg class="social-icon" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></a>
            </div>
        </div>

        <div id="hero" class="hero-banner"></div>

        <div id="movie-info" class="movie-header">
            <div class="movie-title">
                <h1 id="title"></h1>
                <div class="movie-meta"><span id="year"></span> · DIRIGIDA POR <span id="director"></span></div>
                <div class="btn-group">
                    <a id="btn-trailer" href="#" target="_blank" class="btn-app">▶ TRÁILER</a>
                    <a id="btn-jw" href="#" target="_blank" class="btn-app">📺 JUSTWATCH</a>
                </div>
            </div>
            <img id="poster" src="" class="poster-img">
        </div>

        <div id="overview" class="synopsis"></div>

        <div id="cast-section" style="display:none;">
            <div class="section-label">Reparto Principal</div>
            <div id="cast-list" class="cast-list"></div>
        </div>

        <div id="similar-section" style="display:none;">
            <div class="section-label">Películas Similares</div>
            <div id="similar-grid" class="similar-grid"></div>
        </div>

        <div class="controls-footer">
            <h3 id="welcome-text" style="margin-top: 0; font-size: 1.5rem;">¿Qué miramos hoy?</h3>
            <div class="filter-row">
                <select id="filter-genre">
                    <option value="">Cualquier Género</option>
                    <option value="28">Acción</option><option value="12">Aventura</option><option value="16">Animación</option>
                    <option value="35">Comedia</option><option value="80">Crimen</option><option value="99">Documental</option>
                    <option value="18">Drama</option><option value="10751">Familia</option><option value="14">Fantasía</option>
                    <option value="27">Terror</option><option value="10402">Música</option><option value="9648">Misterio</option>
                    <option value="10749">Romance</option><option value="878">Ciencia Ficción</option><option value="53">Thriller</option>
                </select>
                <select id="filter-decade">
                    <option value="">Cualquier Año</option>
                    <option value="2020">2020s</option><option value="2010">2010s</option><option value="2000">2000s</option>
                    <option value="1990">1990s</option><option value="1980">1980s</option><option value="1970">1970s</option>
                </select>
            </div>
            <button class="btn-sortear" id="btn-sortear" onclick="sortear()">¡Sorprendeme!</button>
        </div>
    </div>

    <script>
        const API_KEY = 'b9911fb46e0e11491607c279cce876a1';

        async function loadMovie(movieId) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            try {
                const [det, vid, sim] = await Promise.all([
                    fetch(`https://api.themoviedb.org/3/movie/${movieId}?api_key=${API_KEY}&language=es-MX&append_to_response=credits`),
                    fetch(`https://api.themoviedb.org/3/movie/${movieId}/videos?api_key=${API_KEY}`),
                    fetch(`https://api.themoviedb.org/3/movie/${movieId}/similar?api_key=${API_KEY}&language=es-MX`)
                ]);
                const details = await det.json();
                const videos = await vid.json();
                const similar = await sim.json();

                document.getElementById('welcome-text').innerText = "¡Sorteada!";
                document.getElementById('hero').style.display = 'block';
                document.getElementById('movie-info').style.display = 'grid';
                document.getElementById('cast-section').style.display = 'block';
                document.getElementById('similar-section').style.display = 'block';

                if(details.backdrop_path) document.getElementById('hero').style.backgroundImage = `url(https://image.tmdb.org/t/p/w1280${details.backdrop_path})`;
                document.getElementById('title').innerText = details.title;
                document.getElementById('poster').src = `https://image.tmdb.org/t/p/w500${details.poster_path}`;
                document.getElementById('year').innerText = details.release_date.split('-')[0];
                document.getElementById('overview').innerText = details.overview || "Sinopsis no disponible.";
                
                const dir = details.credits.crew.find(c => c.job === 'Director');
                document.getElementById('director').innerText = dir ? dir.name : 'Desconocido';

                document.getElementById('cast-list').innerHTML = details.credits.cast.slice(0, 6).map(a => `
                    <div class="cast-item">
                        <img src="${a.profile_path ? 'https://image.tmdb.org/t/p/w185' + a.profile_path : 'https://via.placeholder.com/60'}" class="cast-img">
                        <span class="cast-name">${a.name}</span>
                    </div>`).join('');

                const trailer = videos.results.find(v => v.type === 'Trailer');
                document.getElementById('btn-trailer').href = trailer ? `https://youtube.com/watch?v=${trailer.key}` : '#';
                document.getElementById('btn-jw').href = `https://www.justwatch.com/ar/buscar?q=${encodeURIComponent(details.title)}`;

                document.getElementById('similar-grid').innerHTML = similar.results.slice(0, 6).map(m => `
                    <div class="similar-item" onclick="loadMovie(${m.id})">
                        <img src="https://image.tmdb.org/t/p/w342${m.poster_path}" alt="${m.title}">
                    </div>`).join('');

            } catch (e) { console.error(e); }
        }

        async function sortear() {
            const btn = document.getElementById('btn-sortear');
            const genre = document.getElementById('filter-genre').value;
            const decade = document.getElementById('filter-decade').value;
            btn.innerText = "BUSCANDO...";
            btn.disabled = true;

            try {
                let url = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=es-MX&sort_by=vote_count.desc&include_adult=false&page=${Math.floor(Math.random() * 5) + 1}`;
                if (genre) url += `&with_genres=${genre}`;
                if (decade) url += `&primary_release_date.gte=${decade}-01-01&primary_release_date.lte=${parseInt(decade)+9}-12-31`;

                const resp = await fetch(url);
                const data = await resp.json();
                const movie = data.results[Math.floor(Math.random() * data.results.length)];
                if (movie) await loadMovie(movie.id);
            } catch (e) { console.error(e); }

            btn.innerText = "¡SORPRENDEME!";
            btn.disabled = false;
        }
    </script>
</body>
</html>
